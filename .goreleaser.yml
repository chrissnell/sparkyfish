version: 2

project_name: sparkyfish

before:
  hooks:
    - go mod tidy

builds:
  - id: sparkyfish
    main: ./cmd/sparkyfish
    binary: sparkyfish
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{ .Version }}
    goos:
      - linux
      - darwin
      - windows
      - openbsd
      - freebsd
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: openbsd
        goarch: arm64
      - goos: freebsd
        goarch: arm64
      - goos: windows
        goarch: arm64

  - id: sparkyfish-server
    main: ./cmd/sparkyfish-server
    binary: sparkyfish-server
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{ .Version }}
    goos:
      - linux
      - darwin
      - openbsd
      - freebsd
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: openbsd
        goarch: arm64
      - goos: freebsd
        goarch: arm64

archives:
  - id: sparkyfish
    builds:
      - sparkyfish
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- if eq .Os "darwin" }}macOS{{ else }}{{ .Os }}{{ end }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end }}
    files:
      - README*

  - id: sparkyfish-server
    builds:
      - sparkyfish-server
    format: tar.gz
    name_template: >-
      sparkyfish-server_
      {{- .Version }}_
      {{- if eq .Os "darwin" }}macOS{{ else }}{{ .Os }}{{ end }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end }}
    files:
      - README*

nfpms:
  - id: sparkyfish-deb-rpm
    builds:
      - sparkyfish
    package_name: sparkyfish
    vendor: chrissnell
    homepage: https://github.com/chrissnell/sparkyfish
    description: Network speed test client
    formats:
      - deb
      - rpm
    bindir: /usr/bin

  - id: sparkyfish-server-deb-rpm
    builds:
      - sparkyfish-server
    package_name: sparkyfish-server
    vendor: chrissnell
    homepage: https://github.com/chrissnell/sparkyfish
    description: Network speed test server
    formats:
      - deb
      - rpm
    bindir: /usr/bin
    contents:
      - src: packaging/systemd/sparkyfish-server.service
        dst: /usr/lib/systemd/system/sparkyfish-server.service
      - src: packaging/systemd/sparkyfish-server.sysusers
        dst: /usr/lib/sysusers.d/sparkyfish-server.conf
      - src: packaging/systemd/sparkyfish-server.default
        dst: /etc/default/sparkyfish-server
        type: config|noreplace
    scripts:
      postinstall: packaging/scripts/postinstall.sh
      preremove: packaging/scripts/preremove.sh
      postremove: packaging/scripts/postremove.sh

checksum:
  name_template: 'checksums.txt'

release:
  draft: false
  replace_existing_draft: true
  replace_existing_artifacts: true
  target_commitish: '{{ .Commit }}'
  prerelease: auto
  mode: replace

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
